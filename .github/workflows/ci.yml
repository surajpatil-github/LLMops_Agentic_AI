name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv .venv
          # Strip Windows-only and local packages that can't install on Linux
          grep -vE '^\s*(pywin32|llmops-series)(==.*)?\s*$' requirements.txt > /tmp/req-linux.txt
          uv pip install --python .venv/bin/python \
            torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install --python .venv/bin/python \
            -r /tmp/req-linux.txt pytest pytest-cov

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/multi_doc_chat
          GROQ_API_KEY: dummy
          GOOGLE_API_KEY: dummy
          LLM_PROVIDER: google
        run: .venv/bin/pytest tests/ -q --tb=short

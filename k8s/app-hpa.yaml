# Horizontal Pod Autoscaler — scales between 2 and 10 replicas
# based on CPU (70%) and memory (80%) utilization.
#
# Requires metrics-server installed in cluster:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: multidocchat-hpa
  namespace: multidocchat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: multidocchat-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min cool-down before scale-in
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

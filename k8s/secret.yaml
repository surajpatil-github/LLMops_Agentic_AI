# ⚠️  In production, manage secrets with Vault, Sealed Secrets, or External Secrets Operator.
# This file uses base64-encoded placeholders — replace before deploying.
#
# Generate:  echo -n "your_key" | base64
apiVersion: v1
kind: Secret
metadata:
  name: multidocchat-secrets
  namespace: multidocchat
type: Opaque
data:
  GROQ_API_KEY: REPLACE_WITH_BASE64_ENCODED_KEY
  GOOGLE_API_KEY: REPLACE_WITH_BASE64_ENCODED_KEY
  OPENAI_API_KEY: REPLACE_WITH_BASE64_ENCODED_KEY

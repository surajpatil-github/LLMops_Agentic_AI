apiVersion: v1
kind: Service
metadata:
  name: multidocchat-redis
  namespace: multidocchat
  labels:
    app: multidocchat-redis
spec:
  type: ClusterIP
  clusterIP: None       # Headless for StatefulSet stable DNS
  selector:
    app: multidocchat-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: multidocchat
    static_configs:
      - targets: ["app:8080"]
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
